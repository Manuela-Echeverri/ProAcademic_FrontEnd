<div class="p-6">
  <div class="flex justify-between items-center mb-6">
    <h1 class="text-2xl font-bold text-gray-700">Materias</h1>
    <button mat-flat-button color="primary">
      <mat-icon>add</mat-icon>
      Nueva Materia
    </button>
  </div>

  @if (cargando) {
    <div class="flex justify-center p-8">
      <mat-spinner diameter="48"></mat-spinner>
    </div>
  } @else if (materias.length === 0) {
    <div class="flex flex-col items-center justify-center p-8 text-gray-400">
      <mat-icon>book</mat-icon>
      <p>No hay materias registradas</p>
    </div>
  } @else {
    <table mat-table [dataSource]="materias" class="w-full shadow rounded-lg">

      <ng-container matColumnDef="codigo">
        <th mat-header-cell *matHeaderCellDef>Código</th>
        <td mat-cell *matCellDef="let m">{{ m.codigo }}</td>
      </ng-container>

      <ng-container matColumnDef="nombre">
        <th mat-header-cell *matHeaderCellDef>Nombre</th>
        <td mat-cell *matCellDef="let m">{{ m.nombre }}</td>
      </ng-container>

      <ng-container matColumnDef="descripcion">
        <th mat-header-cell *matHeaderCellDef>Descripción</th>
        <td mat-cell *matCellDef="let m">{{ m.descripcion }}</td>
      </ng-container>

      <ng-container matColumnDef="creditos">
        <th mat-header-cell *matHeaderCellDef>Créditos</th>
        <td mat-cell *matCellDef="let m">{{ m.creditos }}</td>
      </ng-container>

      <ng-container matColumnDef="activa">
        <th mat-header-cell *matHeaderCellDef>Estado</th>
        <td mat-cell *matCellDef="let m">
          <span [class]="m.activa ? 'text-green-600 font-bold' : 'text-red-600 font-bold'">
            {{ m.activa ? 'Activa' : 'Inactiva' }}
          </span>
        </td>
      </ng-container>

      <ng-container matColumnDef="acciones">
        <th mat-header-cell *matHeaderCellDef>Acciones</th>
        <td mat-cell *matCellDef="let m">
          <button mat-icon-button color="primary">
            <mat-icon>edit</mat-icon>
          </button>
          <button mat-icon-button color="warn" (click)="eliminar(m.id)">
            <mat-icon>delete</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="columnas"></tr>
      <tr mat-row *matRowDef="let row; columns: columnas;"></tr>
    </table>
  }
</div>
