<div class="p-6">

  <div class="flex justify-between items-center mb-6">

    <h2 class="text-2xl font-bold">
      Gestión de Materias
    </h2>

    <div class="flex gap-3">

      <button
        mat-flat-button
        color="accent"
        (click)="imprimirPDF()">

        Generar PDF

      </button>

      <button
        mat-flat-button
        color="primary"
        (click)="abrirFormularioNuevo()">

        Nueva Materia

      </button>

    </div>

  </div>

  <table
    mat-table
    [dataSource]="dataSource"
    class="w-full shadow rounded-lg">

    <!-- NOMBRE -->
    <ng-container matColumnDef="nombre">

      <th mat-header-cell *matHeaderCellDef>
        Nombre
      </th>

      <td mat-cell *matCellDef="let m">
        {{ m.nombre }}
      </td>

    </ng-container>

    <!-- DESCRIPCIÓN -->
    <ng-container matColumnDef="descripcion">

      <th mat-header-cell *matHeaderCellDef>
        Descripción
      </th>

      <td mat-cell *matCellDef="let m">
        {{ m.descripcion }}
      </td>

    </ng-container>

    <!-- ACCIONES -->
    <ng-container matColumnDef="acciones">

      <th mat-header-cell *matHeaderCellDef>
        Acciones
      </th>

      <td mat-cell *matCellDef="let m">

        <button
          mat-icon-button
          color="primary"
          (click)="abrirFormularioEditar(m)">

          <mat-icon>edit</mat-icon>

        </button>

        <button
          mat-icon-button
          color="warn"
          (click)="eliminar(m.id!)">

          <mat-icon>delete</mat-icon>

        </button>

      </td>

    </ng-container>

    <tr
      mat-header-row
      *matHeaderRowDef="columnas">
    </tr>

    <tr
      mat-row
      *matRowDef="let row; columns: columnas;">
    </tr>

  </table>

  <mat-paginator
    [pageSize]="5"
    showFirstLastButtons>
  </mat-paginator>

  @if (mostrarFormulario) {

    <div class="mt-8 p-6 border rounded shadow">

      <h3 class="text-xl font-semibold mb-4">

        {{ editando ? 'Editar Materia' : 'Nueva Materia' }}

      </h3>

      <form
        [formGroup]="formulario"
        class="flex flex-col gap-4">

        <mat-form-field appearance="outline">

          <mat-label>Nombre</mat-label>

          <input
            matInput
            formControlName="nombre">

        </mat-form-field>

        <mat-form-field appearance="outline">

          <mat-label>Descripción</mat-label>

          <input
            matInput
            formControlName="descripcion">

        </mat-form-field>

        <div class="flex gap-3">

          <button
            mat-flat-button
            color="primary"
            type="button"
            (click)="guardar()">

            {{ editando ? 'Actualizar' : 'Guardar' }}

          </button>

          <button
            mat-flat-button
            color="warn"
            type="button"
            (click)="cerrarFormulario()">

            Cancelar

          </button>

        </div>

      </form>

    </div>
  }

</div>
