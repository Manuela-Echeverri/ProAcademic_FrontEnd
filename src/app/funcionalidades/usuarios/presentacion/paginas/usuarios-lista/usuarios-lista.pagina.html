<div class="p-6">
  <div class="flex justify-between items-center mb-6">
    <h1 class="text-2xl font-bold text-gray-700">Usuarios</h1>
    <button mat-flat-button color="primary">
      <mat-icon>add</mat-icon>
      Nuevo Usuario
    </button>
  </div>

 @if (cargando) {
  <div class="flex justify-center p-8">
    <mat-spinner diameter="48"></mat-spinner>
  </div>
} @else if (usuarios.length === 0) {
  <div class="flex flex-col items-center justify-center p-8 text-gray-400">
    <mat-icon>inbox</mat-icon>
    <p>No hay usuarios registrados</p>
  </div>
} @else {
    <table mat-table [dataSource]="usuarios" class="w-full shadow rounded-lg">

      <ng-container matColumnDef="nombre">
        <th mat-header-cell *matHeaderCellDef>Nombre</th>
        <td mat-cell *matCellDef="let u">{{ u.nombre }}</td>
      </ng-container>

      <ng-container matColumnDef="apellido">
        <th mat-header-cell *matHeaderCellDef>Apellido</th>
        <td mat-cell *matCellDef="let u">{{ u.apellido }}</td>
      </ng-container>

      <ng-container matColumnDef="correo">
        <th mat-header-cell *matHeaderCellDef>Correo</th>
        <td mat-cell *matCellDef="let u">{{ u.correo }}</td>
      </ng-container>

      <ng-container matColumnDef="rol">
        <th mat-header-cell *matHeaderCellDef>Rol</th>
        <td mat-cell *matCellDef="let u">{{ u.rol }}</td>
      </ng-container>

      <ng-container matColumnDef="activo">
        <th mat-header-cell *matHeaderCellDef>Estado</th>
        <td mat-cell *matCellDef="let u">
          <span [class]="u.activo ? 'text-green-600 font-bold' : 'text-red-600 font-bold'">
            {{ u.activo ? 'Activo' : 'Inactivo' }}
          </span>
        </td>
      </ng-container>

      <ng-container matColumnDef="acciones">
        <th mat-header-cell *matHeaderCellDef>Acciones</th>
        <td mat-cell *matCellDef="let u">
          <button mat-icon-button color="primary">
            <mat-icon>edit</mat-icon>
          </button>
          <button mat-icon-button color="warn" (click)="eliminar(u.id)">
            <mat-icon>delete</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="columnas"></tr>
      <tr mat-row *matRowDef="let row; columns: columnas;"></tr>
    </table>
  }
</div>
