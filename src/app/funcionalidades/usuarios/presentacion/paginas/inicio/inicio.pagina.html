<mat-sidenav-container class="min-h-screen">

  <mat-sidenav mode="side" [opened]="menuAbierto" class="w-64 bg-blue-800">
    <div class="flex flex-col items-center p-6 bg-blue-900">
      <mat-icon class="text-white text-5xl mb-2">school</mat-icon>
      <h2 class="text-white font-bold text-lg">Pro Academic</h2>
    </div>

    <mat-nav-list>
      @for (item of menuItems; track item.ruta) {
        <mat-list-item (click)="navegarA(item.ruta)" class="cursor-pointer hover:bg-blue-700">
          <mat-icon matListItemIcon class="text-white">{{ item.icono }}</mat-icon>
          <span matListItemTitle class="text-white">{{ item.etiqueta }}</span>
        </mat-list-item>
      }
    </mat-nav-list>
  </mat-sidenav>

  <mat-sidenav-content>
    <mat-toolbar color="primary">
      <button mat-icon-button (click)="menuAbierto = !menuAbierto">
        <mat-icon>menu</mat-icon>
      </button>
      <span class="flex-1">Bienvenido, {{ sesion?.nombre || 'Usuario' }}</span>
      <button mat-icon-button (click)="cerrarSesion()">
        <mat-icon>logout</mat-icon>
      </button>
    </mat-toolbar>

    <div class="p-6">
      <h1 class="text-2xl font-bold text-gray-700 mb-4">Panel Principal</h1>

      <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
        <div class="bg-white rounded-lg shadow p-6 flex items-center gap-4">
          <mat-icon class="text-blue-600 text-4xl">people</mat-icon>
          <div>
            <p class="text-gray-500 text-sm">Usuarios</p>
            <p class="text-2xl font-bold">0</p>
          </div>
        </div>
        <div class="bg-white rounded-lg shadow p-6 flex items-center gap-4">
          <mat-icon class="text-green-600 text-4xl">book</mat-icon>
          <div>
            <p class="text-gray-500 text-sm">Materias</p>
            <p class="text-2xl font-bold">0</p>
          </div>
        </div>
        <div class="bg-white rounded-lg shadow p-6 flex items-center gap-4">
          <mat-icon class="text-orange-600 text-4xl">grade</mat-icon>
          <div>
            <p class="text-gray-500 text-sm">Notas</p>
            <p class="text-2xl font-bold">0</p>
          </div>
        </div>
      </div>
    </div>

  </mat-sidenav-content>

</mat-sidenav-container>
