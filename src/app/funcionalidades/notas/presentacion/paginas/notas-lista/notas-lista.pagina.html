<div class="p-6">
  <div class="flex justify-between items-center mb-6">
    <h1 class="text-2xl font-bold text-gray-700">Notas</h1>
    <button mat-flat-button color="primary">
      <mat-icon>add</mat-icon>
      Nueva Nota
    </button>
  </div>

  @if (cargando) {
    <div class="flex justify-center p-8">
      <mat-spinner diameter="48"></mat-spinner>
    </div>
  } @else if (notas.length === 0) {
    <div class="flex flex-col items-center justify-center p-8 text-gray-400">
      <mat-icon>grade</mat-icon>
      <p>No hay notas registradas</p>
    </div>
  } @else {
    <table mat-table [dataSource]="notas" class="w-full shadow rounded-lg">

      <ng-container matColumnDef="estudiante">
        <th mat-header-cell *matHeaderCellDef>Estudiante</th>
        <td mat-cell *matCellDef="let n">{{ n.estudianteNombre }}</td>
      </ng-container>

      <ng-container matColumnDef="materia">
        <th mat-header-cell *matHeaderCellDef>Materia</th>
        <td mat-cell *matCellDef="let n">{{ n.materiaNombre }}</td>
      </ng-container>

      <ng-container matColumnDef="valor">
        <th mat-header-cell *matHeaderCellDef>Nota</th>
        <td mat-cell *matCellDef="let n">
          <mat-chip [color]="obtenerColor(n.valor)" highlighted>
            {{ n.valor }}
          </mat-chip>
        </td>
      </ng-container>

      <ng-container matColumnDef="periodo">
        <th mat-header-cell *matHeaderCellDef>Periodo</th>
        <td mat-cell *matCellDef="let n">{{ n.periodo }}</td>
      </ng-container>

      <ng-container matColumnDef="observacion">
        <th mat-header-cell *matHeaderCellDef>Observación</th>
        <td mat-cell *matCellDef="let n">{{ n.observacion }}</td>
      </ng-container>

      <ng-container matColumnDef="acciones">
        <th mat-header-cell *matHeaderCellDef>Acciones</th>
        <td mat-cell *matCellDef="let n">
          <button mat-icon-button color="primary">
            <mat-icon>edit</mat-icon>
          </button>
          <button mat-icon-button color="warn" (click)="eliminar(n.id)">
            <mat-icon>delete</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="columnas"></tr>
      <tr mat-row *matRowDef="let row; columns: columnas;"></tr>
    </table>
  }
</div>
